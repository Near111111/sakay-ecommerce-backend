# App
spring.application.name=sakay-ecommerce
server.port=8080

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sakay_ecommerce}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# JWT
jwt.secret=${JWT_SECRET:your-very-secret-key-at-least-32-characters-long}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# MinIO (S3-compatible)
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:products}

# PayMongo
paymongo.secret-key=${PAYMONGO_SECRET_KEY:sk_test_your_key_here}
paymongo.public-key=${PAYMONGO_PUBLIC_KEY:pk_test_your_key_here}
paymongo.webhook-secret=${PAYMONGO_WEBHOOK_SECRET:whsk_your_secret_here}

# Txtbox SMS
txtbox.api-key=${TXTBOX_API_KEY:your_txtbox_api_key_here}
txtbox.sender-id=${TXTBOX_SENDER_ID:Sakay}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:19006,http://192.168.0.226:3000}

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.mvc.format.date-time=iso
spring.jackson.mapper.require-handlers-for-java8-times=false
logging.level.com.sakay=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.root=ERROR

